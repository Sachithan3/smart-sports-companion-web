<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Table Tennis - Rule-Based Physics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #videoContainer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border: 3px solid #00ff88;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.3);
            background: #000;
        }
        
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        #overlay div {
            margin: 5px 0;
        }
        
        .status {
            color: #ffaa00;
            font-weight: bold;
        }
        
        .ready {
            color: #00ff88;
            font-weight: bold;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
        }
        
        button {
            background: #00ff88;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00dd77;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas3d"></canvas>
        
        <div id="videoContainer">
            <video id="webcam" autoplay playsinline></video>
        </div>
        
        <div id="overlay">
            <div>Score: <span id="scorePlayer">0</span> - <span id="scoreAI">0</span></div>
            <div>FPS: <span id="fps">60</span></div>
            <div>Rally: <span id="rally">0</span></div>
            <div class="status" id="status">Initializing...</div>
        </div>
        
        <div id="controls">
            <button id="startBtn" disabled>Start Game</button>
            <button id="resetBtn">Reset Score</button>
            <button id="difficultyBtn">Difficulty: Medium</button>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <script>
        // ==================== CONSTANTS ====================
        const TABLE = {
            width: 2.74,
            length: 1.525,
            height: 0.76,
            thickness: 0.05
        };
        
        const NET = {
            height: 0.1525,
            thickness: 0.01
        };
        
        const BALL = {
            radius: 0.02
        };
        
        const PADDLE = {
            radius: 0.08,
            thickness: 0.01
        };
        
        // ==================== RULE-BASED MOTION SYSTEM ====================
        // Replaces physics-based system with deterministic rules
        const MOTION_RULES = {
            // Speed scaling from paddle contact
            baseSpeed: 2.5,              // Base travel speed (m/s)
            speedFromPaddleMin: 2.0,     // Minimum speed after paddle hit
            speedFromPaddleMax: 4.0,     // Maximum speed after paddle hit
            paddleSpeedInfluence: 0.4,   // How much paddle velocity affects ball
            
            // Arc interpolation (replaces gravity)
            arcHeightMin: 0.15,          // Minimum arc peak height above table
            arcHeightMax: 0.35,          // Maximum arc peak height above table
            arcFromEdgeHit: 0.25,        // Extra arc height from edge hits
            
            // Table bounce rules
            tableBounceHeight: 0.20,     // Fixed bounce height (not physics)
            bounceAngleVariation: 0.15,  // Random angle variation on bounce
            
            // Direction control
            reversalOnPaddle: true,      // Always reverse Z direction on paddle hit
            centeringForce: 0.3          // Pull toward table center (prevents edge loops)
        };
        
        const DIFFICULTY = {
            easy: { 
                reactionDelay: 0.25,
                errorMargin: 0.12,
                speed: 3.5,
                returnSpeed: 2.0
            },
            medium: { 
                reactionDelay: 0.15,
                errorMargin: 0.06,
                speed: 5.0,
                returnSpeed: 2.5
            },
            hard: { 
                reactionDelay: 0.08,
                errorMargin: 0.02,
                speed: 7.0,
                returnSpeed: 3.2
            }
        };
        
        // ==================== GAME STATE ====================
        let scene, camera, renderer, clock;
        let table, net, ball, playerPaddle, aiPaddle;
        
        // REMOVED: ballVelocity (physics-based)
        // REMOVED: ballSpin (physics-based)
        
        // NEW: Rule-based ball state
        let ballState = {
            startPos: new THREE.Vector3(),      // Where current trajectory started
            targetPos: new THREE.Vector3(),     // Where ball is heading
            progress: 0,                         // 0 to 1 interpolation progress
            duration: 0,                         // Time to reach target
            arcHeight: 0,                        // Peak height of arc
            direction: 1,                        // 1 = toward AI, -1 = toward player
            speed: MOTION_RULES.baseSpeed       // Current travel speed
        };
        
        let gameState = 'waiting';
        let scorePlayer = 0, scoreAI = 0, rallyCount = 0;
        let difficulty = 'medium';
        let aiTarget = new THREE.Vector3();
        let aiReactionTime = 0;
        let lastHitter = null;
        
        // Hand tracking (UNCHANGED)
        let handTracking = null;
        let handPosition = { x: 0.5, y: 0.5 };
        let smoothedHandPos = { x: 0.5, y: 0.5 };
        let previousHandPos = { x: 0.5, y: 0.5 };
        let handVelocity = { x: 0, y: 0 };
        
        // Performance
        let frameCount = 0;
        let fpsUpdateTime = 0;
        
        // ==================== INITIALIZATION (MOSTLY UNCHANGED) ====================
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );
            camera.position.set(0, 2.5, 3);
            camera.lookAt(0, TABLE.height, 0);
            
            // Renderer
            const canvas = document.getElementById('canvas3d');
            renderer = new THREE.WebGLRenderer({ 
                canvas, 
                antialias: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Clock
            clock = new THREE.Clock();
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(3, 5, 2);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 15;
            mainLight.shadow.camera.left = -3;
            mainLight.shadow.camera.right = 3;
            mainLight.shadow.camera.top = 3;
            mainLight.shadow.camera.bottom = -3;
            scene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0x6699ff, 0.3);
            fillLight.position.set(-3, 3, -2);
            scene.add(fillLight);
            
            const rimLight = new THREE.DirectionalLight(0xff6699, 0.2);
            rimLight.position.set(0, 2, -3);
            scene.add(rimLight);
            
            // Create game objects
            createTable();
            createNet();
            createBall();
            createPaddles();
            createEnvironment();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('difficultyBtn').addEventListener('click', cycleDifficulty);
            
            // Start hand tracking
            initHandTracking();
        }
        
        function createTable() {
            const geometry = new THREE.BoxGeometry(TABLE.width, TABLE.thickness, TABLE.length);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x1a5c3f,
                roughness: 0.3,
                metalness: 0.1
            });
            table = new THREE.Mesh(geometry, material);
            table.position.y = TABLE.height;
            table.receiveShadow = true;
            table.castShadow = true;
            scene.add(table);
            
            // White center line
            const lineGeometry = new THREE.BoxGeometry(TABLE.width, 0.002, 0.02);
            const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const centerLine = new THREE.Mesh(lineGeometry, lineMaterial);
            centerLine.position.set(0, TABLE.height + TABLE.thickness/2 + 0.001, 0);
            scene.add(centerLine);
            
            // White edge lines
            const edgeThickness = 0.02;
            const edges = [
                { w: TABLE.width, d: edgeThickness, x: 0, z: TABLE.length/2 - edgeThickness/2 },
                { w: TABLE.width, d: edgeThickness, x: 0, z: -TABLE.length/2 + edgeThickness/2 },
                { w: edgeThickness, d: TABLE.length, x: TABLE.width/2 - edgeThickness/2, z: 0 },
                { w: edgeThickness, d: TABLE.length, x: -TABLE.width/2 + edgeThickness/2, z: 0 }
            ];
            
            edges.forEach(edge => {
                const geo = new THREE.BoxGeometry(edge.w, 0.002, edge.d);
                const mesh = new THREE.Mesh(geo, lineMaterial);
                mesh.position.set(edge.x, TABLE.height + TABLE.thickness/2 + 0.001, edge.z);
                scene.add(mesh);
            });
        }
        
        function createNet() {
            const postGeometry = new THREE.CylinderGeometry(0.01, 0.01, NET.height, 8);
            const postMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            
            const leftPost = new THREE.Mesh(postGeometry, postMaterial);
            leftPost.position.set(-TABLE.width/2, TABLE.height + NET.height/2, 0);
            leftPost.castShadow = true;
            scene.add(leftPost);
            
            const rightPost = new THREE.Mesh(postGeometry, postMaterial);
            rightPost.position.set(TABLE.width/2, TABLE.height + NET.height/2, 0);
            rightPost.castShadow = true;
            scene.add(rightPost);
            
            const netGeometry = new THREE.BoxGeometry(TABLE.width, NET.height, NET.thickness);
            const netMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x222222,
                transparent: true,
                opacity: 0.7,
                wireframe: true
            });
            net = new THREE.Mesh(netGeometry, netMaterial);
            net.position.set(0, TABLE.height + NET.height/2, 0);
            scene.add(net);
        }
        
        function createBall() {
            const geometry = new THREE.SphereGeometry(BALL.radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff6600,
                roughness: 0.4,
                metalness: 0.1,
                emissive: 0xff3300,
                emissiveIntensity: 0.2
            });
            ball = new THREE.Mesh(geometry, material);
            ball.castShadow = true;
            scene.add(ball);
            
            // Add glow effect
            const glowGeometry = new THREE.SphereGeometry(BALL.radius * 1.3, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xff6600,
                transparent: true,
                opacity: 0.2
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            ball.add(glow);
            
            resetBallPosition();
        }
        
        function createPaddles() {
            const geometry = new THREE.CylinderGeometry(PADDLE.radius, PADDLE.radius, PADDLE.thickness, 32);
            
            // Player paddle (green with glow)
            const playerMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0x00ff88,
                emissiveIntensity: 0.3
            });
            playerPaddle = new THREE.Mesh(geometry, playerMaterial);
            playerPaddle.rotation.x = Math.PI / 2;
            playerPaddle.castShadow = true;
            scene.add(playerPaddle);
            
            // AI paddle (red with glow)
            const aiMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff3366,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0xff3366,
                emissiveIntensity: 0.3
            });
            aiPaddle = new THREE.Mesh(geometry, aiMaterial);
            aiPaddle.rotation.x = Math.PI / 2;
            aiPaddle.castShadow = true;
            aiPaddle.position.set(0, TABLE.height + 0.15, -TABLE.length/2 + 0.15);
            scene.add(aiPaddle);
        }
        
        function createEnvironment() {
            // Floor
            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a1a,
                roughness: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Grid on floor
            const gridHelper = new THREE.GridHelper(20, 40, 0x00ff88, 0x1a3a2e);
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
        }
        
        // ==================== HAND TRACKING (UNCHANGED) ====================
        async function initHandTracking() {
            const videoElement = document.getElementById('webcam');
            const statusElement = document.getElementById('status');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: 640, 
                        height: 480,
                        facingMode: 'user'
                    } 
                });
                videoElement.srcObject = stream;
                
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });
                
                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });
                
                hands.onResults(onHandResults);
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
                
                handTracking = hands;
                statusElement.textContent = 'Hand tracking ready! Click Start Game';
                statusElement.className = 'ready';
                document.getElementById('startBtn').disabled = false;
                
            } catch (error) {
                console.error('Camera initialization failed:', error);
                statusElement.textContent = 'Camera access denied!';
                statusElement.className = 'status';
            }
        }
        
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                
                previousHandPos = { ...handPosition };
                handPosition = {
                    x: 1 - indexTip.x,
                    y: 1 - indexTip.y
                };
                
                const dt = 0.016;
                handVelocity = {
                    x: (handPosition.x - previousHandPos.x) / dt,
                    y: (handPosition.y - previousHandPos.y) / dt
                };
            }
        }
        
        // ==================== GAME LOGIC ====================
        function startGame() {
            gameState = 'serving';
            rallyCount = 0;
            updateRally();
            resetBallPosition();
            serveBall();
            document.getElementById('status').textContent = 'Playing!';
        }
        
        function resetGame() {
            scorePlayer = 0;
            scoreAI = 0;
            rallyCount = 0;
            updateScore();
            updateRally();
            gameState = 'waiting';
            resetBallPosition();
            document.getElementById('status').textContent = 'Ready to play! Click Start Game';
        }
        
        function cycleDifficulty() {
            const difficulties = ['easy', 'medium', 'hard'];
            const currentIndex = difficulties.indexOf(difficulty);
            difficulty = difficulties[(currentIndex + 1) % difficulties.length];
            document.getElementById('difficultyBtn').textContent = 
                `Difficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
        }
        
        function resetBallPosition() {
            ball.position.set(0, TABLE.height + 0.3, TABLE.length/4);
            ballState.progress = 1.0; // Not moving
            lastHitter = null;
        }
        
        function serveBall() {
            const params = DIFFICULTY[difficulty];
            
            // Set ball to start position
            ballState.startPos.copy(ball.position);
            
            // Calculate target position (table bounce on AI side)
            ballState.targetPos.set(
                (Math.random() - 0.5) * TABLE.width * 0.6,  // Random X within bounds
                TABLE.height + TABLE.thickness/2,            // Table surface
                -TABLE.length * 0.3                          // AI side
            );
            
            ballState.direction = -1; // Toward AI
            ballState.speed = params.returnSpeed;
            ballState.arcHeight = MOTION_RULES.arcHeightMin + 0.1;
            
            // Calculate duration based on distance and speed
            const distance = ballState.startPos.distanceTo(ballState.targetPos);
            ballState.duration = distance / ballState.speed;
            ballState.progress = 0;
            
            gameState = 'playing';
            lastHitter = 'player';
        }
        
        // ==================== PADDLE CONTROL (UNCHANGED) ====================
        function updatePaddles(deltaTime) {
            // Exponential smoothing for hand position
            const smoothing = 0.25;
            smoothedHandPos.x += (handPosition.x - smoothedHandPos.x) * smoothing;
            smoothedHandPos.y += (handPosition.y - smoothedHandPos.y) * smoothing;
            
            // Map hand position to table coordinates
            const paddleX = (smoothedHandPos.x - 0.5) * TABLE.width * 0.85;
            const paddleZ = TABLE.length/2 - 0.15;
            const paddleY = TABLE.height + 0.08 + smoothedHandPos.y * 0.25;
            
            playerPaddle.position.set(paddleX, paddleY, paddleZ);
            
            // AI paddle logic
            updateAI(deltaTime);
        }
        
        // ==================== AI UPDATE (MODIFIED FOR DETERMINISTIC PREDICTION) ====================
        function updateAI(deltaTime) {
            const params = DIFFICULTY[difficulty];
            
            // Only react when ball is heading toward AI
            if (ballState.direction === -1 && ballState.progress < 0.8) {
                aiReactionTime += deltaTime;
                
                if (aiReactionTime > params.reactionDelay) {
                    // Deterministic prediction: where will ball be at AI's Z position
                    const prediction = predictBallDestination();
                    
                    if (prediction) {
                        aiTarget.x = prediction.x + (Math.random() - 0.5) * params.errorMargin;
                        aiTarget.y = prediction.y;
                        aiTarget.z = -TABLE.length/2 + 0.15;
                        
                        // Clamp to table bounds
                        aiTarget.x = Math.max(-TABLE.width/2 + PADDLE.radius, 
                                             Math.min(TABLE.width/2 - PADDLE.radius, aiTarget.x));
                        aiTarget.y = Math.max(TABLE.height + 0.05, 
                                             Math.min(TABLE.height + 0.5, aiTarget.y));
                    }
                }
            } else {
                aiReactionTime = 0;
                aiTarget.set(0, TABLE.height + 0.15, -TABLE.length/2 + 0.15);
            }
            
            // Smooth movement toward target
            const speed = Math.min(params.speed * deltaTime, 1.0);
            aiPaddle.position.x += (aiTarget.x - aiPaddle.position.x) * speed;
            aiPaddle.position.y += (aiTarget.y - aiPaddle.position.y) * speed;
            aiPaddle.position.z += (aiTarget.z - aiPaddle.position.z) * speed;
        }
        
        // NEW: Deterministic prediction based on current trajectory
        function predictBallDestination() {
            if (ballState.progress >= 1.0) return null;
            
            // Ball is moving in straight line from startPos to targetPos
            // Predict where it will be at AI's Z position
            const targetZ = -TABLE.length/2 + 0.15;
            
            // If target is already past AI, use current trajectory
            if (ballState.targetPos.z < targetZ) {
                // Extrapolate beyond target
                const dir = new THREE.Vector3().subVectors(ballState.targetPos, ballState.startPos).normalize();
                const distanceNeeded = (targetZ - ballState.targetPos.z) / dir.z;
                
                return {
                    x: ballState.targetPos.x + dir.x * distanceNeeded,
                    y: TABLE.height + 0.15,
                    z: targetZ
                };
            }
            
            // Interpolate to find position at AI's Z
            const startZ = ballState.startPos.z;
            const endZ = ballState.targetPos.z;
            const t = (targetZ - startZ) / (endZ - startZ);
            
            if (t < 0 || t > 1) return null;
            
            return {
                x: ballState.startPos.x + (ballState.targetPos.x - ballState.startPos.x) * t,
                y: TABLE.height + 0.15,
                z: targetZ
            };
        }
        
        // ==================== RULE-BASED BALL UPDATE ====================
        // REPLACES: Physics-based updateBall() with gravity, forces, etc.
        function updateBall(deltaTime) {
            if (gameState !== 'playing') return;
            
            // Update interpolation progress
            if (ballState.progress < 1.0) {
                ballState.progress += deltaTime / ballState.duration;
                ballState.progress = Math.min(ballState.progress, 1.0);
            }
            
            // Interpolate position along straight path with arc
            const t = ballState.progress;
            
            // Linear interpolation for X and Z
            ball.position.x = ballState.startPos.x + (ballState.targetPos.x - ballState.startPos.x) * t;
            ball.position.z = ballState.startPos.z + (ballState.targetPos.z - ballState.startPos.z) * t;
            
            // Parabolic arc for Y (simulates trajectory without gravity)
            // Peak at t=0.5, using sine curve for smooth arc
            const arcProgress = Math.sin(t * Math.PI); // 0 at start/end, 1 at middle
            ball.position.y = ballState.startPos.y + (ballState.targetPos.y - ballState.startPos.y) * t +
                             ballState.arcHeight * arcProgress;
            
            // Visual rotation (not physics-based)
            ball.rotation.x += ballState.speed * deltaTime * 5;
            ball.rotation.z += ballState.speed * deltaTime * 3;
            
            // Collision detection
            checkPaddleCollision(playerPaddle, 'player');
            checkPaddleCollision(aiPaddle, 'ai');
            checkTableBounce();
            checkBounds();
        }
        
        // ==================== COLLISION HANDLERS (RULE-BASED) ====================
        
        // NEW: Rule-based paddle collision
        function checkPaddleCollision(paddle, hitter) {
            if (lastHitter === hitter) return;
            
            const distance = ball.position.distanceTo(paddle.position);
            const collisionDist = BALL.radius + PADDLE.radius;
            
            if (distance < collisionDist) {
                // Calculate contact point offset from paddle center
                const offset = new THREE.Vector3().subVectors(ball.position, paddle.position);
                const offsetX = offset.x / PADDLE.radius; // -1 to 1
                const offsetY = offset.y / PADDLE.radius;
                
                // RULE: Direction always reverses
                ballState.direction *= -1;
                
                // RULE: Calculate new target based on paddle hit
                ballState.startPos.copy(ball.position);
                
                // Target side depends on direction
                const targetZ = ballState.direction > 0 ? 
                    TABLE.length * 0.3 :     // Toward player
                    -TABLE.length * 0.3;     // Toward AI
                
                // RULE: Speed from paddle movement + contact point
                let speed = MOTION_RULES.baseSpeed;
                
                if (hitter === 'player') {
                    // Player speed based on hand velocity
                    const handSpeed = Math.sqrt(handVelocity.x * handVelocity.x + handVelocity.y * handVelocity.y);
                    speed = MOTION_RULES.speedFromPaddleMin + 
                           handSpeed * MOTION_RULES.paddleSpeedInfluence;
                    
                    // Edge hits add angle
                    ballState.targetPos.x = offsetX * TABLE.width * 0.4 + 
                                           handVelocity.x * 0.2;
                } else {
                    // AI return with difficulty-based speed
                    const params = DIFFICULTY[difficulty];
                    speed = params.returnSpeed;
                    
                    // AI aims with variation
                    ballState.targetPos.x = (Math.random() - 0.5) * TABLE.width * 0.5;
                }
                
                // Clamp speed
                speed = Math.max(MOTION_RULES.speedFromPaddleMin,
                               Math.min(MOTION_RULES.speedFromPaddleMax, speed));
                
                ballState.speed = speed;
                
                // RULE: Arc height from edge hits
                const edgeHit = Math.abs(offsetX);
                ballState.arcHeight = MOTION_RULES.arcHeightMin + 
                                     edgeHit * MOTION_RULES.arcFromEdgeHit;
                
                // Set target on table
                ballState.targetPos.y = TABLE.height + TABLE.thickness/2;
                ballState.targetPos.z = targetZ;
                
                // Clamp X to table
                ballState.targetPos.x = Math.max(-TABLE.width/2 + 0.1,
                                                Math.min(TABLE.width/2 - 0.1, ballState.targetPos.x));
                
                // Calculate duration
                const distance = ballState.startPos.distanceTo(ballState.targetPos);
                ballState.duration = distance / ballState.speed;
                ballState.progress = 0;
                
                // Update game state
                lastHitter = hitter;
                rallyCount++;
                updateRally();
            }
        }
        
        // NEW: Rule-based table bounce
        function checkTableBounce() {
            const tableTop = TABLE.height + TABLE.thickness/2;
            
            // Check if ball is at target position (table surface)
            if (ballState.progress >= 0.95 && Math.abs(ball.position.y - tableTop) < 0.05) {
                // Check if within table bounds
                if (Math.abs(ball.position.x) <= TABLE.width/2 && 
                    Math.abs(ball.position.z) <= TABLE.length/2) {
                    
                    // RULE: Simple Y-axis reflection with fixed bounce height
                    ballState.startPos.copy(ball.position);
                    
                    // Continue in same X/Z direction, but with small variation
                    const continueX = ballState.targetPos.x - ballState.startPos.x;
                    const continueZ = ballState.targetPos.z - ballState.startPos.z;
                    
                    // Add random angle variation
                    ballState.targetPos.x = ball.position.x + continueX * 0.8 + 
                                           (Math.random() - 0.5) * MOTION_RULES.bounceAngleVariation;
                    
                    // Determine which side to go to
                    const targetZ = ballState.direction > 0 ?
                        TABLE.length/2 - 0.1 :   // Player side
                        -TABLE.length/2 + 0.1;   // AI side
                    
                    ballState.targetPos.z = targetZ;
                    ballState.targetPos.y = TABLE.height + TABLE.thickness/2;
                    
                    // Clamp X
                    ballState.targetPos.x = Math.max(-TABLE.width/2 + 0.1,
                                                    Math.min(TABLE.width/2 - 0.1, ballState.targetPos.x));
                    
                    // RULE: Fixed bounce arc (not physics)
                    ballState.arcHeight = MOTION_RULES.tableBounceHeight;
                    
                    // Maintain speed
                    const distance = ballState.startPos.distanceTo(ballState.targetPos);
                    ballState.duration = distance / ballState.speed;
                    ballState.progress = 0;
                }
            }
        }
        
        function checkBounds() {
            // Side bounds
            if (Math.abs(ball.position.x) > TABLE.width/2 + 0.5) {
                resetPoint();
            }
            
            // End bounds - scoring
            if (ball.position.z > TABLE.length/2 + 0.5) {
                scoreAI++;
                updateScore();
                resetPoint();
            } else if (ball.position.z < -TABLE.length/2 - 0.5) {
                scorePlayer++;
                updateScore();
                resetPoint();
            }
            
            // Floor bounds
            if (ball.position.y < TABLE.height - 0.3) {
                resetPoint();
            }
        }
        
        function resetPoint() {
            gameState = 'serving';
            rallyCount = 0;
            updateRally();
            resetBallPosition();
            setTimeout(() => {
                if (gameState === 'serving') {
                    serveBall();
                }
            }, 1500);
        }
        
        function updateScore() {
            document.getElementById('scorePlayer').textContent = scorePlayer;
            document.getElementById('scoreAI').textContent = scoreAI;
        }
        
        function updateRally() {
            document.getElementById('rally').textContent = rallyCount;
        }
        
        // ==================== ANIMATION LOOP (UNCHANGED) ====================
        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = Math.min(clock.getDelta(), 0.05);
            
            updatePaddles(deltaTime);
            updateBall(deltaTime);
            
            camera.position.x = Math.sin(Date.now() * 0.0001) * 0.1;
            
            renderer.render(scene, camera);
            
            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - fpsUpdateTime > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                fpsUpdateTime = now;
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ==================== START ====================
        init();
        animate();
    </script>
</body>
</html>
