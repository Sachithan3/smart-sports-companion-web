<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Table Tennis - Hand Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #videoContainer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border: 3px solid #00ff88;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 255, 136, 0.3);
            background: #000;
        }
        
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        #overlay div {
            margin: 5px 0;
        }
        
        .status {
            color: #ffaa00;
            font-weight: bold;
        }
        
        .ready {
            color: #00ff88;
            font-weight: bold;
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            display: flex;
            gap: 15px;
        }
        
        button {
            background: #00ff88;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #00dd77;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }
        
        button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas3d"></canvas>
        
        <div id="videoContainer">
            <video id="webcam" autoplay playsinline></video>
        </div>
        
        <div id="overlay">
            <div>Score: <span id="scorePlayer">0</span> - <span id="scoreAI">0</span></div>
            <div>FPS: <span id="fps">60</span></div>
            <div>Rally: <span id="rally">0</span></div>
            <div class="status" id="status">Initializing...</div>
        </div>
        
        <div id="controls">
            <button id="startBtn" disabled>Start Game</button>
            <button id="resetBtn">Reset Score</button>
            <button id="difficultyBtn">Difficulty: Medium</button>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    
    <script>
        // ==================== CONSTANTS ====================
        const TABLE = {
            width: 2.74,
            length: 1.525,
            height: 0.76,
            thickness: 0.05
        };
        
        const NET = {
            height: 0.1525,
            thickness: 0.01
        };
        
        const BALL = {
            radius: 0.02,
            mass: 0.0027
        };
        
        const PADDLE = {
            radius: 0.08,
            thickness: 0.01
        };
        
        const PHYSICS = {
            gravity: -9.81,
            airResistance: 0.995,
            tableRestitution: 0.82,
            paddleRestitution: 1.05,
            spinFactor: 0.3
        };
        
        const DIFFICULTY = {
            easy: { reactionDelay: 0.25, errorMargin: 0.12, speed: 3.5, returnSpeed: 1.8 },
            medium: { reactionDelay: 0.15, errorMargin: 0.06, speed: 5.0, returnSpeed: 2.2 },
            hard: { reactionDelay: 0.08, errorMargin: 0.02, speed: 7.0, returnSpeed: 2.8 }
        };
        
        // ==================== GAME STATE ====================
        let scene, camera, renderer, clock;
        let table, net, ball, playerPaddle, aiPaddle;
        let ballVelocity = new THREE.Vector3();
        let ballSpin = new THREE.Vector3();
        let gameState = 'waiting'; // waiting, serving, playing
        let scorePlayer = 0, scoreAI = 0, rallyCount = 0;
        let difficulty = 'medium';
        let aiTarget = new THREE.Vector3();
        let aiReactionTime = 0;
        let lastHitter = null; // Track who hit the ball last
        
        // Hand tracking
        let handTracking = null;
        let handPosition = { x: 0.5, y: 0.5 };
        let smoothedHandPos = { x: 0.5, y: 0.5 };
        let previousHandPos = { x: 0.5, y: 0.5 };
        let handVelocity = { x: 0, y: 0 };
        
        // Performance
        let frameCount = 0;
        let fpsUpdateTime = 0;
        
        // ==================== INITIALIZATION ====================
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 5, 15);
            
            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );
            camera.position.set(0, 2.5, 3);
            camera.lookAt(0, TABLE.height, 0);
            
            // Renderer
            const canvas = document.getElementById('canvas3d');
            renderer = new THREE.WebGLRenderer({ 
                canvas, 
                antialias: true,
                powerPreference: "high-performance"
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Clock
            clock = new THREE.Clock();
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
            mainLight.position.set(3, 5, 2);
            mainLight.castShadow = true;
            mainLight.shadow.mapSize.width = 2048;
            mainLight.shadow.mapSize.height = 2048;
            mainLight.shadow.camera.near = 0.5;
            mainLight.shadow.camera.far = 15;
            mainLight.shadow.camera.left = -3;
            mainLight.shadow.camera.right = 3;
            mainLight.shadow.camera.top = 3;
            mainLight.shadow.camera.bottom = -3;
            scene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0x6699ff, 0.3);
            fillLight.position.set(-3, 3, -2);
            scene.add(fillLight);
            
            const rimLight = new THREE.DirectionalLight(0xff6699, 0.2);
            rimLight.position.set(0, 2, -3);
            scene.add(rimLight);
            
            // Create game objects
            createTable();
            createNet();
            createBall();
            createPaddles();
            createEnvironment();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            document.getElementById('startBtn').addEventListener('click', startGame);
            document.getElementById('resetBtn').addEventListener('click', resetGame);
            document.getElementById('difficultyBtn').addEventListener('click', cycleDifficulty);
            
            // Start hand tracking
            initHandTracking();
        }
        
        function createTable() {
            const geometry = new THREE.BoxGeometry(TABLE.width, TABLE.thickness, TABLE.length);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0x1a5c3f,
                roughness: 0.3,
                metalness: 0.1
            });
            table = new THREE.Mesh(geometry, material);
            table.position.y = TABLE.height;
            table.receiveShadow = true;
            table.castShadow = true;
            scene.add(table);
            
            // White center line
            const lineGeometry = new THREE.BoxGeometry(TABLE.width, 0.002, 0.02);
            const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const centerLine = new THREE.Mesh(lineGeometry, lineMaterial);
            centerLine.position.set(0, TABLE.height + TABLE.thickness/2 + 0.001, 0);
            scene.add(centerLine);
            
            // White edge lines
            const edgeThickness = 0.02;
            const edges = [
                { w: TABLE.width, d: edgeThickness, x: 0, z: TABLE.length/2 - edgeThickness/2 },
                { w: TABLE.width, d: edgeThickness, x: 0, z: -TABLE.length/2 + edgeThickness/2 },
                { w: edgeThickness, d: TABLE.length, x: TABLE.width/2 - edgeThickness/2, z: 0 },
                { w: edgeThickness, d: TABLE.length, x: -TABLE.width/2 + edgeThickness/2, z: 0 }
            ];
            
            edges.forEach(edge => {
                const geo = new THREE.BoxGeometry(edge.w, 0.002, edge.d);
                const mesh = new THREE.Mesh(geo, lineMaterial);
                mesh.position.set(edge.x, TABLE.height + TABLE.thickness/2 + 0.001, edge.z);
                scene.add(mesh);
            });
        }
        
        function createNet() {
            const postGeometry = new THREE.CylinderGeometry(0.01, 0.01, NET.height, 8);
            const postMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
            
            const leftPost = new THREE.Mesh(postGeometry, postMaterial);
            leftPost.position.set(-TABLE.width/2, TABLE.height + NET.height/2, 0);
            leftPost.castShadow = true;
            scene.add(leftPost);
            
            const rightPost = new THREE.Mesh(postGeometry, postMaterial);
            rightPost.position.set(TABLE.width/2, TABLE.height + NET.height/2, 0);
            rightPost.castShadow = true;
            scene.add(rightPost);
            
            const netGeometry = new THREE.BoxGeometry(TABLE.width, NET.height, NET.thickness);
            const netMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x222222,
                transparent: true,
                opacity: 0.7,
                wireframe: true
            });
            net = new THREE.Mesh(netGeometry, netMaterial);
            net.position.set(0, TABLE.height + NET.height/2, 0);
            scene.add(net);
        }
        
        function createBall() {
            const geometry = new THREE.SphereGeometry(BALL.radius, 32, 32);
            const material = new THREE.MeshStandardMaterial({ 
                color: 0xff6600,
                roughness: 0.4,
                metalness: 0.1,
                emissive: 0xff3300,
                emissiveIntensity: 0.2
            });
            ball = new THREE.Mesh(geometry, material);
            ball.castShadow = true;
            scene.add(ball);
            
            // Add glow effect
            const glowGeometry = new THREE.SphereGeometry(BALL.radius * 1.3, 16, 16);
            const glowMaterial = new THREE.MeshBasicMaterial({
                color: 0xff6600,
                transparent: true,
                opacity: 0.2
            });
            const glow = new THREE.Mesh(glowGeometry, glowMaterial);
            ball.add(glow);
            
            resetBallPosition();
        }
        
        function createPaddles() {
            const geometry = new THREE.CylinderGeometry(PADDLE.radius, PADDLE.radius, PADDLE.thickness, 32);
            
            // Player paddle (green with glow)
            const playerMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x00ff88,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0x00ff88,
                emissiveIntensity: 0.3
            });
            playerPaddle = new THREE.Mesh(geometry, playerMaterial);
            playerPaddle.rotation.x = Math.PI / 2;
            playerPaddle.castShadow = true;
            scene.add(playerPaddle);
            
            // AI paddle (red with glow)
            const aiMaterial = new THREE.MeshStandardMaterial({ 
                color: 0xff3366,
                roughness: 0.3,
                metalness: 0.2,
                emissive: 0xff3366,
                emissiveIntensity: 0.3
            });
            aiPaddle = new THREE.Mesh(geometry, aiMaterial);
            aiPaddle.rotation.x = Math.PI / 2;
            aiPaddle.castShadow = true;
            aiPaddle.position.set(0, TABLE.height + 0.15, -TABLE.length/2 + 0.15);
            scene.add(aiPaddle);
        }
        
        function createEnvironment() {
            // Floor
            const floorGeometry = new THREE.PlaneGeometry(20, 20);
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a1a,
                roughness: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Grid on floor for depth perception
            const gridHelper = new THREE.GridHelper(20, 40, 0x00ff88, 0x1a3a2e);
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
        }
        
        // ==================== HAND TRACKING ====================
        async function initHandTracking() {
            const videoElement = document.getElementById('webcam');
            const statusElement = document.getElementById('status');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: 640, 
                        height: 480,
                        facingMode: 'user'
                    } 
                });
                videoElement.srcObject = stream;
                
                const hands = new Hands({
                    locateFile: (file) => {
                        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                    }
                });
                
                hands.setOptions({
                    maxNumHands: 1,
                    modelComplexity: 1,
                    minDetectionConfidence: 0.7,
                    minTrackingConfidence: 0.7
                });
                
                hands.onResults(onHandResults);
                
                const camera = new Camera(videoElement, {
                    onFrame: async () => {
                        await hands.send({ image: videoElement });
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
                
                handTracking = hands;
                statusElement.textContent = 'Hand tracking ready! Click Start Game';
                statusElement.className = 'ready';
                document.getElementById('startBtn').disabled = false;
                
            } catch (error) {
                console.error('Camera initialization failed:', error);
                statusElement.textContent = 'Camera access denied!';
                statusElement.className = 'status';
            }
        }
        
        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexTip = landmarks[8];
                
                previousHandPos = { ...handPosition };
                handPosition = {
                    x: 1 - indexTip.x,
                    y: 1 - indexTip.y
                };
                
                const dt = 0.016; // Approximate 60fps
                handVelocity = {
                    x: (handPosition.x - previousHandPos.x) / dt,
                    y: (handPosition.y - previousHandPos.y) / dt
                };
            }
        }
        
        // ==================== GAME LOGIC ====================
        function startGame() {
            gameState = 'serving';
            rallyCount = 0;
            updateRally();
            resetBallPosition();
            serveBall();
            document.getElementById('status').textContent = 'Playing!';
        }
        
        function resetGame() {
            scorePlayer = 0;
            scoreAI = 0;
            rallyCount = 0;
            updateScore();
            updateRally();
            gameState = 'waiting';
            resetBallPosition();
            ballVelocity.set(0, 0, 0);
            document.getElementById('status').textContent = 'Ready to play! Click Start Game';
        }
        
        function cycleDifficulty() {
            const difficulties = ['easy', 'medium', 'hard'];
            const currentIndex = difficulties.indexOf(difficulty);
            difficulty = difficulties[(currentIndex + 1) % difficulties.length];
            document.getElementById('difficultyBtn').textContent = 
                `Difficulty: ${difficulty.charAt(0).toUpperCase() + difficulty.slice(1)}`;
        }
        
        function resetBallPosition() {
            ball.position.set(0, TABLE.height + 0.3, TABLE.length/4);
            ballVelocity.set(0, 0, 0);
            ballSpin.set(0, 0, 0);
            lastHitter = null;
        }
        
        function serveBall() {
            const params = DIFFICULTY[difficulty];
            ballVelocity.set(
                (Math.random() - 0.5) * 0.8,
                1.2,
                -params.returnSpeed
            );
            gameState = 'playing';
            lastHitter = 'player';
        }
        
        function updatePaddles(deltaTime) {
            // Exponential smoothing for hand position
            const smoothing = 0.25;
            smoothedHandPos.x += (handPosition.x - smoothedHandPos.x) * smoothing;
            smoothedHandPos.y += (handPosition.y - smoothedHandPos.y) * smoothing;
            
            // Map hand position to table coordinates
            const paddleX = (smoothedHandPos.x - 0.5) * TABLE.width * 0.85;
            const paddleZ = TABLE.length/2 - 0.15;
            const paddleY = TABLE.height + 0.08 + smoothedHandPos.y * 0.25;
            
            playerPaddle.position.set(paddleX, paddleY, paddleZ);
            
            // AI paddle logic
            updateAI(deltaTime);
        }
        
        function updateAI(deltaTime) {
            const params = DIFFICULTY[difficulty];
            
            // Only react when ball is coming toward AI (negative Z velocity)
            if (ballVelocity.z < -0.1 && ball.position.z < 0.2) {
                aiReactionTime += deltaTime;
                
                if (aiReactionTime > params.reactionDelay) {
                    // Predict where ball will be at AI's paddle Z position
                    const targetZ = -TABLE.length/2 + 0.15;
                    const prediction = predictBallPosition(ball.position, ballVelocity, targetZ);
                    
                    if (prediction) {
                        aiTarget.x = prediction.x + (Math.random() - 0.5) * params.errorMargin;
                        aiTarget.y = prediction.y;
                        aiTarget.z = targetZ;
                        
                        // Clamp to table bounds
                        aiTarget.x = Math.max(-TABLE.width/2 + PADDLE.radius, 
                                             Math.min(TABLE.width/2 - PADDLE.radius, aiTarget.x));
                        aiTarget.y = Math.max(TABLE.height + 0.05, 
                                             Math.min(TABLE.height + 0.5, aiTarget.y));
                    }
                }
            } else {
                aiReactionTime = 0;
                // Return to center ready position
                aiTarget.set(0, TABLE.height + 0.15, -TABLE.length/2 + 0.15);
            }
            
            // Smooth movement toward target with speed based on difficulty
            const speed = Math.min(params.speed * deltaTime, 1.0);
            aiPaddle.position.x += (aiTarget.x - aiPaddle.position.x) * speed;
            aiPaddle.position.y += (aiTarget.y - aiPaddle.position.y) * speed;
            aiPaddle.position.z += (aiTarget.z - aiPaddle.position.z) * speed;
        }
        
        function predictBallPosition(position, velocity, targetZ) {
            if (Math.abs(velocity.z) < 0.01) return null;
            
            const timeToTarget = (targetZ - position.z) / velocity.z;
            if (timeToTarget < 0 || timeToTarget > 5) return null;
            
            return {
                x: position.x + velocity.x * timeToTarget,
                y: position.y + velocity.y * timeToTarget + 0.5 * PHYSICS.gravity * timeToTarget * timeToTarget,
                z: targetZ
            };
        }
        
        function updateBall(deltaTime) {
            if (gameState !== 'playing') return;
            
            // Apply physics
            ballVelocity.y += PHYSICS.gravity * deltaTime;
            ballVelocity.multiplyScalar(PHYSICS.airResistance);
            
            // Update position
            ball.position.x += ballVelocity.x * deltaTime;
            ball.position.y += ballVelocity.y * deltaTime;
            ball.position.z += ballVelocity.z * deltaTime;
            
            // Apply spin effect
            ball.rotation.x += ballSpin.x * deltaTime * 10;
            ball.rotation.y += ballSpin.y * deltaTime * 10;
            ball.rotation.z += ballSpin.z * deltaTime * 10;
            
            // Collision detection
            checkTableCollision();
            checkPaddleCollision(playerPaddle, 'player');
            checkPaddleCollision(aiPaddle, 'ai');
            checkBounds();
        }
        
        function checkTableCollision() {
            const tableTop = TABLE.height + TABLE.thickness/2;
            
            if (ball.position.y - BALL.radius <= tableTop && ballVelocity.y < 0) {
                // Check if within table bounds
                if (Math.abs(ball.position.x) <= TABLE.width/2 && 
                    Math.abs(ball.position.z) <= TABLE.length/2) {
                    
                    ball.position.y = tableTop + BALL.radius;
                    ballVelocity.y *= -PHYSICS.tableRestitution;
                    
                    // Apply spin effect on bounce
                    ballVelocity.x += ballSpin.y * PHYSICS.spinFactor * 0.05;
                    ballVelocity.z += ballSpin.x * PHYSICS.spinFactor * 0.05;
                    
                    // Decay spin
                    ballSpin.multiplyScalar(0.9);
                }
            }
        }
        
        function checkPaddleCollision(paddle, hitter) {
            // Only check collision if this paddle didn't just hit the ball
            if (lastHitter === hitter) return;
            
            const distance = ball.position.distanceTo(paddle.position);
            const collisionDist = BALL.radius + PADDLE.radius;
            
            if (distance < collisionDist) {
                // Calculate collision normal
                const normal = new THREE.Vector3()
                    .subVectors(ball.position, paddle.position)
                    .normalize();
                
                // Check if ball is approaching paddle
                const approachSpeed = -ballVelocity.dot(normal);
                
                if (approachSpeed > 0) {
                    // Reflect velocity
                    const reflection = normal.clone().multiplyScalar(2 * approachSpeed);
                    ballVelocity.add(reflection);
                    ballVelocity.multiplyScalar(PHYSICS.paddleRestitution);
                    
                    // Add paddle influence
                    if (hitter === 'player') {
                        ballVelocity.x += handVelocity.x * 0.3;
                        ballVelocity.y += Math.abs(handVelocity.y) * 0.2;
                        
                        // Generate spin
                        ballSpin.set(
                            -handVelocity.y * 5,
                            handVelocity.x * 5,
                            0
                        );
                    } else {
                        // AI adds slight variation to return
                        const params = DIFFICULTY[difficulty];
                        ballVelocity.x += (Math.random() - 0.5) * 0.5;
                        ballVelocity.y += 0.3 + Math.random() * 0.3;
                        
                        // Ensure ball goes back toward player
                        if (ballVelocity.z < 0) {
                            ballVelocity.z = Math.abs(ballVelocity.z);
                        }
                    }
                    
                    // Ensure minimum speed
                    const minSpeed = 1.5;
                    const speed = ballVelocity.length();
                    if (speed < minSpeed) {
                        ballVelocity.normalize().multiplyScalar(minSpeed);
                    }
                    
                    // Separate ball from paddle
                    const separation = collisionDist - distance + 0.01;
                    ball.position.add(normal.multiplyScalar(separation));
                    
                    // Update last hitter and rally count
                    lastHitter = hitter;
                    rallyCount++;
                    updateRally();
                }
            }
        }
        
        function checkBounds() {
            // Side bounds
            if (Math.abs(ball.position.x) > TABLE.width/2 + 0.5) {
                resetPoint();
            }
            
            // End bounds - scoring
            if (ball.position.z > TABLE.length/2 + 0.5) {
                // Ball went past player - AI scores
                scoreAI++;
                updateScore();
                resetPoint();
            } else if (ball.position.z < -TABLE.length/2 - 0.5) {
                // Ball went past AI - Player scores
                scorePlayer++;
                updateScore();
                resetPoint();
            }
            
            // Floor bounds
            if (ball.position.y < -0.5) {
                resetPoint();
            }
        }
        
        function resetPoint() {
            gameState = 'serving';
            rallyCount = 0;
            updateRally();
            resetBallPosition();
            setTimeout(() => {
                if (gameState === 'serving') {
                    serveBall();
                }
            }, 1500);
        }
        
        function updateScore() {
            document.getElementById('scorePlayer').textContent = scorePlayer;
            document.getElementById('scoreAI').textContent = scoreAI;
        }
        
        function updateRally() {
            document.getElementById('rally').textContent = rallyCount;
        }
        
        // ==================== ANIMATION LOOP ====================
        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = Math.min(clock.getDelta(), 0.05);
            
            updatePaddles(deltaTime);
            updateBall(deltaTime);
            
            // Camera subtle movement
            camera.position.x = Math.sin(Date.now() * 0.0001) * 0.1;
            
            renderer.render(scene, camera);
            
            // FPS counter
            frameCount++;
            const now = performance.now();
            if (now - fpsUpdateTime > 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                fpsUpdateTime = now;
            }
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ==================== START ====================
        init();
